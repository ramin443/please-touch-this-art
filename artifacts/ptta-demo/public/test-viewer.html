<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>PTTA — Standalone Model Viewer Test</title>
  <script
    type="module"
    src="https://unpkg.com/@google/model-viewer@4.2.0/dist/model-viewer.min.js">
  </script>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0a0806;
      color: #f5f1ea;
    }
    header {
      padding: 16px 20px;
      background: #14110e;
      border-bottom: 1px solid #2a2520;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
    }
    h1 { margin: 0; font-size: 16px; font-weight: 600; }
    button {
      padding: 8px 14px;
      border-radius: 999px;
      border: 1px solid #3a3530;
      background: #1e1a16;
      color: #f5f1ea;
      font-size: 13px;
      cursor: pointer;
    }
    button.active { background: #f59e0b; color: #0a0806; border-color: #f59e0b; }
    main { position: relative; width: 100vw; height: calc(100vh - 64px); }
    model-viewer {
      width: 100%;
      height: 100%;
      background: #14110e;
      --poster-color: transparent;
    }
    #status {
      position: absolute;
      top: 12px;
      left: 12px;
      padding: 8px 12px;
      background: rgba(0,0,0,0.7);
      border-radius: 8px;
      font-size: 12px;
      font-family: ui-monospace, Menlo, monospace;
      white-space: pre-line;
    }
  </style>
</head>
<body>
  <header>
    <h1>Standalone model-viewer test</h1>
    <button id="mona" class="active">Mona Lisa</button>
    <button id="gogh">Van Gogh</button>
    <span style="font-size:12px;opacity:0.6;margin-left:auto;">Loaded from unpkg CDN — no bundler</span>
  </header>
  <main>
    <model-viewer
      id="mv"
      src="/models/mona-lisa.glb"
      alt="Tactile relief model"
      camera-controls
      auto-rotate
      auto-rotate-delay="0"
      rotation-per-second="30deg"
      camera-orbit="-30deg 78deg auto"
      min-camera-orbit="-90deg 45deg auto"
      max-camera-orbit="90deg 100deg auto"
      shadow-intensity="1.8"
      shadow-softness="0.5"
      exposure="1.0"
      environment-image="neutral"
      touch-action="pan-y"
      interaction-prompt="none"
      loading="eager"
    ></model-viewer>
    <div id="status">booting…</div>
  </main>
  <script>
    const mv = document.getElementById("mv");
    const status = document.getElementById("status");
    const setStatus = (s) => (status.textContent = s);
    mv.addEventListener("load", () => setStatus("loaded ✓"));
    mv.addEventListener("progress", (e) => {
      const p = Math.round((e.detail.totalProgress || 0) * 100);
      setStatus("loading " + p + "%");
    });
    mv.addEventListener("error", (e) => {
      setStatus("error: " + (e.detail?.sourceError?.message || e.detail?.type || "unknown"));
    });
    document.getElementById("mona").onclick = () => {
      mv.src = "/models/mona-lisa.glb";
      document.getElementById("mona").classList.add("active");
      document.getElementById("gogh").classList.remove("active");
    };
    document.getElementById("gogh").onclick = () => {
      mv.src = "/models/van-gogh.glb";
      document.getElementById("gogh").classList.add("active");
      document.getElementById("mona").classList.remove("active");
    };
  </script>
</body>
</html>
